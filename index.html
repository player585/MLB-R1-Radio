<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=240, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MLB R1 Radio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root,[data-theme="dark"]{
  --bg:#0d0f0e;--sur:#131615;--sur2:#191c1a;--surO:#1f2320;--surD:#252928;
  --div:#2a2e2c;--bor:#333836;
  --tx:#e8ebe9;--txM:#7a8078;--txF:#4a4f4d;
  --red:#c8102e;--win:#22c55e;--loss:#ef4444;
  --live:#f59e0b;--fin:#7a8078;--sch:#5591c7;--radio:#3b82f6;
  --r:.375rem;--rf:9999px;
  --s1:.25rem;--s2:.5rem;--s3:.75rem;--s4:1rem;--s6:1.5rem;
  --fb:'Inter',system-ui,sans-serif;--fm:'JetBrains Mono',monospace;
  --txs:.5625rem;--tsm:.625rem;--tb:.6875rem;--tmd:.8125rem;
  --tr:160ms cubic-bezier(.16,1,.3,1);
}
[data-theme="light"]{
  --bg:#f4f5f4;--sur:#fff;--sur2:#f9faf9;--surO:#eef0ee;--surD:#e5e8e5;
  --div:#dce0dc;--bor:#d0d4d0;--tx:#111412;--txM:#5a625a;--txF:#9aa09a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:none;text-size-adjust:none;-webkit-font-smoothing:antialiased;height:100%}
body{font-family:var(--fb);font-size:var(--tb);color:var(--tx);background:var(--bg);
  height:100dvh;overflow:hidden;display:flex;flex-direction:column;max-width:240px;margin:0 auto}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
a,button{transition:color var(--tr),background var(--tr),opacity var(--tr)}
a{text-decoration:none;color:inherit}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;
  padding:var(--s2) var(--s3);background:var(--sur);border-bottom:1px solid var(--div);flex-shrink:0;gap:var(--s2)}
.hlogo{display:flex;align-items:center;gap:var(--s2)}
.htitle{font-size:var(--tsm);font-weight:700;letter-spacing:-.01em;line-height:1}
.htitle span{color:var(--red)}
.hctrl{display:flex;align-items:center;gap:var(--s2)}
.ldot{width:7px;height:7px;border-radius:var(--rf);background:var(--radio);animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.75)}}
.bico{min-width:28px;min-height:28px;width:28px;height:28px;border-radius:var(--r);
  display:flex;align-items:center;justify-content:center;color:var(--txM);background:var(--surO)}
.bico:active{background:var(--surD);color:var(--tx)}

/* DATE TABS */
.tabs{display:flex;background:var(--sur2);border-bottom:1px solid var(--div);flex-shrink:0}
.tab{flex:1;padding:var(--s2) 0;font-family:var(--fm);font-size:var(--txs);font-weight:700;
  text-align:center;text-transform:uppercase;letter-spacing:.04em;color:var(--txM);
  border-bottom:2px solid transparent;transition:color var(--tr),border-color var(--tr)}
.tab.active{color:var(--red);border-bottom-color:var(--red)}
.tab:active{background:var(--surD)}

/* STATUS BAR */
.sbar{display:flex;align-items:center;justify-content:space-between;padding:var(--s1) var(--s3);
  background:color-mix(in oklch,var(--red) 8%,var(--sur));border-bottom:1px solid var(--div);flex-shrink:0}
.sdate{font-size:var(--txs);font-weight:600;color:var(--tx);font-family:var(--fm)}
.sgames{font-size:var(--txs);color:var(--txM);font-family:var(--fm)}
.vmwk{font-size:.4375rem;font-family:var(--fm);color:var(--txF);opacity:.45;line-height:1}

/* SCROLL */
.scroll{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:var(--bor) transparent}
.scroll::-webkit-scrollbar{width:3px}
.scroll::-webkit-scrollbar-thumb{background:var(--bor);border-radius:var(--rf)}

/* GAME CARDS */
.glist{padding:var(--s2);display:flex;flex-direction:column;gap:var(--s2)}
.gc{background:var(--sur);border:1px solid var(--bor);border-radius:.5rem;overflow:hidden;
  transition:box-shadow var(--tr),transform var(--tr)}
.gc:active{transform:scale(.985)}
.gc.focused{border-color:var(--radio);box-shadow:0 0 0 1.5px var(--radio)}
.gc.open{border-color:var(--red);box-shadow:0 0 0 1px var(--red)}
.gch{display:flex;align-items:center;justify-content:space-between;
  padding:var(--s2) var(--s3);border-bottom:1px solid var(--div);background:var(--sur2)}
.badge{font-size:.5rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
  padding:1px 4px;border-radius:var(--rf);font-family:var(--fm)}
.bl{background:color-mix(in oklch,var(--live) 18%,transparent);color:var(--live)}
.bf{background:color-mix(in oklch,var(--fin) 18%,transparent);color:var(--fin)}
.bs{background:color-mix(in oklch,var(--sch) 18%,transparent);color:var(--sch)}
.gvenue{font-size:.5rem;color:var(--txF);font-family:var(--fm)}
.gmatch{padding:var(--s2) var(--s3);display:flex;flex-direction:column;gap:var(--s1)}
.trow{display:flex;align-items:center;gap:var(--s2)}
.tabb{font-family:var(--fm);font-weight:700;font-size:var(--tsm);width:28px;flex-shrink:0;letter-spacing:.02em}
.tname{font-size:var(--txs);color:var(--txM);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tscore{font-family:var(--fm);font-weight:700;font-size:var(--tmd);min-width:22px;text-align:right;line-height:1}
.tscore.win{color:var(--win)}
.inn{font-family:var(--fm);font-size:var(--txs);color:var(--live);min-width:38px;text-align:right;line-height:1.2}
.inn.fin{color:var(--txF)}

/* LISTEN BTN */
.lrow{padding:var(--s2) var(--s3)}
.lbtn{display:flex;align-items:center;justify-content:center;gap:var(--s1);
  width:100%;padding:var(--s2) 0;
  background:color-mix(in oklch,var(--radio) 15%,var(--surO));
  border:1px solid color-mix(in oklch,var(--radio) 40%,var(--bor));
  color:var(--radio);border-radius:var(--r);
  font-family:var(--fm);font-size:var(--tsm);font-weight:700;
  text-transform:uppercase;letter-spacing:.04em}
.lbtn:active{background:color-mix(in oklch,var(--radio) 25%,var(--surO))}
.lbtn.active{background:color-mix(in oklch,var(--red) 15%,var(--surO));
  border-color:color-mix(in oklch,var(--red) 40%,var(--bor));color:var(--red)}

/* STATIONS DRAWER */
.drw{display:none;border-top:1px solid var(--div);background:var(--sur2);padding:var(--s1) var(--s2) var(--s2)}
.drw.open{display:block}
.drw-team{font-family:var(--fm);font-size:.5rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:var(--red);padding:var(--s1) var(--s1) 2px;
  border-bottom:1px solid var(--div);margin-bottom:2px}
.stn{display:flex;align-items:center;justify-content:space-between;
  padding:var(--s1) var(--s1);border-radius:var(--r);margin-bottom:1px;cursor:pointer;
  transition:background var(--tr)}
.stn:active,.stn:hover{background:var(--surD)}
.stn.playing{background:color-mix(in oklch,var(--radio) 18%,var(--surO));
  border-left:2px solid var(--radio)}
.scall{font-family:var(--fm);font-size:var(--tsm);font-weight:600;color:var(--tx)}
.sloc{font-family:var(--fm);font-size:.5rem;color:var(--txF)}
.sarr{font-size:var(--txs);color:var(--radio);margin-left:var(--s1);flex-shrink:0}
.drw-loading{font-family:var(--fm);font-size:var(--txs);color:var(--txF);
  text-align:center;padding:var(--s2) 0;animation:pulse 1.4s ease-in-out infinite}

/* IN-APP PLAYER OVERLAY */
.player-overlay{
  position:fixed;bottom:0;left:0;right:0;max-width:240px;margin:0 auto;
  background:var(--sur);border-top:2px solid var(--red);
  z-index:100;display:none;flex-direction:column;
}
.player-overlay.visible{display:flex}
.player-bar{display:flex;align-items:center;justify-content:space-between;
  padding:var(--s2) var(--s3);gap:var(--s2);flex-shrink:0}
.player-info{flex:1;min-width:0}
.player-stn{font-family:var(--fm);font-size:var(--tsm);font-weight:700;color:var(--tx);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-game{font-family:var(--fm);font-size:var(--txs);color:var(--txM)}
.player-dot{width:6px;height:6px;border-radius:var(--rf);background:var(--radio);
  flex-shrink:0;animation:pulse 1.8s ease-in-out infinite}
.player-dot.playing{background:var(--live)}
.player-close{font-size:var(--tsm);color:var(--txM);padding:2px 4px;
  border-radius:var(--r);background:var(--surO)}
.player-close:active{background:var(--surD)}
.player-frame-wrap{height:52px;overflow:hidden;flex-shrink:0}
.player-frame{width:100%;height:200px;border:none;transform:scale(1);transform-origin:top left}

/* SKELETON */
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skel{background:linear-gradient(90deg,var(--surO) 25%,var(--surD) 50%,var(--surO) 75%);
  background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite;border-radius:.5rem}
.skelc{height:80px;margin-bottom:var(--s2)}

/* EMPTY/ERROR */
.empty{display:flex;flex-direction:column;align-items:center;text-align:center;
  padding:var(--s6) var(--s4);color:var(--txM);gap:var(--s2)}
.eico{font-size:2rem;opacity:.4}
.etitle{font-weight:600;font-size:var(--tmd);color:var(--tx)}
.esub{font-size:var(--tsm);color:var(--txM)}
.rbtn{margin-top:var(--s2);padding:var(--s1) var(--s3);background:var(--surO);
  border-radius:var(--r);font-size:var(--txs);font-weight:600;min-height:28px}
.rbtn:active{background:var(--surD)}

/* FOOTER */
.ftr{display:flex;align-items:center;justify-content:space-between;
  padding:var(--s1) var(--s3);background:var(--sur);border-top:1px solid var(--div);flex-shrink:0}
.ftxt{font-size:var(--txs);color:var(--txF);font-family:var(--fm)}
.cbw{flex:1;margin:0 var(--s2);height:3px;background:var(--surO);border-radius:var(--rf);overflow:hidden}
.cb{height:100%;background:var(--red);border-radius:var(--rf);transition:width 1s linear}
.rst{font-size:var(--txs);font-family:var(--fm);color:var(--txF);min-width:28px;text-align:right}

:focus-visible{outline:2px solid var(--red);outline-offset:2px;border-radius:2px}
@media(prefers-reduced-motion:reduce){.ldot,.skel,.player-dot{animation:none}.cb{transition:none}}
</style>
</head>
<body>

<header class="hdr">
  <div class="hlogo">
    <svg width="18" height="18" viewBox="0 0 26 26" fill="none">
      <circle cx="13" cy="13" r="12" stroke="#c8102e" stroke-width="1.5" fill="none" stroke-dasharray="4 2"/>
      <path d="M7 9.5C9 8 11 8.5 13 10.5C15 12.5 17 13 19 11.5" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <path d="M7 16.5C9 15 11 15.5 13 17.5C15 19.5 17 20 19 18.5" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <circle cx="13" cy="13" r="2.5" fill="#c8102e"/>
    </svg>
    <div class="htitle"><span>MLB</span> R1 Radio</div>
  </div>
  <div class="hctrl">
    <div class="ldot"></div>
    <button class="bico" id="themeBtn" aria-label="Toggle theme">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <button class="bico" id="refreshBtn" aria-label="Refresh">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.31-3.79"/></svg>
    </button>
  </div>
</header>

<div class="tabs">
  <button class="tab" id="tab-yday" data-offset="-1">YDAY</button>
  <button class="tab active" id="tab-today" data-offset="0">TODAY</button>
  <button class="tab" id="tab-tom" data-offset="1">TMW</button>
</div>

<div class="sbar">
  <span style="display:flex;flex-direction:column;align-items:flex-start">
    <span class="vmwk">v3.0.0</span>
    <span class="sdate" id="sdate">Loading…</span>
  </span>
  <span class="sgames" id="sgames">—</span>
</div>

<main class="scroll" id="mainScroll">
  <div class="glist" id="glist">
    <div class="skel skelc"></div>
    <div class="skel skelc"></div>
    <div class="skel skelc"></div>
  </div>
</main>

<!-- In-app audio player overlay -->
<div class="player-overlay" id="playerOverlay">
  <div class="player-bar">
    <div class="player-info">
      <div class="player-stn" id="playerStn">—</div>
      <div class="player-game" id="playerGame">—</div>
    </div>
    <div class="player-dot" id="playerDot"></div>
    <button class="player-close" id="playerClose">✕</button>
  </div>
  <div class="player-frame-wrap">
    <iframe class="player-frame" id="playerFrame" src="" allow="autoplay" sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>
  </div>
</div>

<footer class="ftr">
  <span class="ftxt" id="ftxt">free-sportsradio.com</span>
  <div class="cbw"><div class="cb" id="cb" style="width:100%"></div></div>
  <span class="rst" id="rst">–</span>
</footer>

<script>
// ── State ──
const S = {
  offset: 0,        // -1=yesterday, 0=today, 1=tomorrow
  theme: 'dark',
  focusIdx: 0,
  countdown: 30,
  timer: null,
  stationMap: {},   // teamName -> [{call, slug}]
  currentStn: null,
  proxyCache: null
};

const PROXIES = [
  u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`
];

// ── Helpers ──
function dateStr(offset) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtDate(offset) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
}
function fmtTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', hour12:true});
}
function ordinal(n) {
  const s = ['th','st','nd','rd'], v = n % 100;
  return n + (s[(v-20)%10] || s[v] || s[0]);
}
function callToSlug(call) {
  // "KNBR 680 AM" -> "knbr-680-am"
  return call.trim().toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9\-]/g, '');
}

const ABBR = {
  'Athletics':'ATH','Oakland Athletics':'ATH','Sacramento Athletics':'ATH',
  'Baltimore Orioles':'BAL','Boston Red Sox':'BOS','Chicago White Sox':'CWS',
  'Cleveland Guardians':'CLE','Detroit Tigers':'DET','Houston Astros':'HOU',
  'Kansas City Royals':'KCR','Los Angeles Angels':'LAA','Minnesota Twins':'MIN',
  'New York Yankees':'NYY','Seattle Mariners':'SEA','Tampa Bay Rays':'TBR',
  'Texas Rangers':'TEX','Toronto Blue Jays':'TOR','Arizona Diamondbacks':'ARI',
  'Atlanta Braves':'ATL','Chicago Cubs':'CHC','Cincinnati Reds':'CIN',
  'Colorado Rockies':'COL','Los Angeles Dodgers':'LAD','Miami Marlins':'MIA',
  'Milwaukee Brewers':'MIL','New York Mets':'NYM','Philadelphia Phillies':'PHI',
  'Pittsburgh Pirates':'PIT','San Diego Padres':'SDP','San Francisco Giants':'SFG',
  'St. Louis Cardinals':'STL','Washington Nationals':'WSN'
};
function abbr(n) { return ABBR[n] || (n||'').substring(0,3).toUpperCase(); }

// ── Proxy fetch with fallbacks ──
async function proxyFetch(targetUrl) {
  for (const buildUrl of PROXIES) {
    try {
      const r = await fetch(buildUrl(targetUrl), {signal: AbortSignal.timeout(6000)});
      if (!r.ok) continue;
      const j = await r.json();
      // allorigins returns {contents}, codetabs/corsproxy return text directly
      const html = j.contents || j;
      if (typeof html === 'string' && html.length > 100) return html;
    } catch(e) { continue; }
  }
  return null;
}

// ── Scrape station data from free-sportsradio.com ──
async function fetchStations() {
  if (S.proxyCache) return S.proxyCache;
  const html = await proxyFetch('https://www.free-sportsradio.com/scores/mlb');
  if (!html) return {};
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const map = {};

  // The site groups stations under each game.
  // Pattern: team name heading -> station callsign lines
  const text = doc.body ? (doc.body.innerText || doc.body.textContent || '') : '';
  const lines = text.split('\n').map(l => l.trim()).filter(l => l);

  let currentTeam = null;
  for (let i = 0; i < lines.length; i++) {
    const l = lines[i];
    // Station callsign: e.g. "KNBR 680 AM" or "WTMJ 620 AM"
    if (l.match(/^[A-Z0-9]{2,6}\s+[\d.]+\s*(AM|FM)/i)) {
      if (currentTeam) {
        if (!map[currentTeam]) map[currentTeam] = [];
        map[currentTeam].push({ call: l, slug: callToSlug(l) });
      }
    }
    // Team name: short all-caps or title-case words, no digits
    else if (l.match(/^[A-Z][a-zA-Z\-]+(?:\s[A-Z][a-zA-Z]+)*$/) && !l.match(/\d/) && l.length < 24 &&
      !['Final','Top','Bottom','Middle','End','Pre','Warmup','Delayed','Postponed',
        'Game','Listen','Now','Scores','Radio','Broadcast','TV','MLB','NFL','NBA','NHL'].includes(l)) {
      currentTeam = l;
    }
  }

  S.proxyCache = map;
  return map;
}

// ── MLB Stats API ──
async function fetchGames(offset) {
  const r = await fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${dateStr(offset)}&hydrate=linescore`);
  if (!r.ok) throw new Error('MLB API error');
  const data = await r.json();
  return (data.dates || [])[0]?.games || [];
}

// ── Render ──
function statusCls(g) {
  const c = g.status?.abstractGameCode;
  return c === 'L' ? 'live' : c === 'F' ? 'final' : 'sched';
}
function statusLabel(g) {
  const c = g.status?.abstractGameCode;
  if (c === 'L') {
    const ls = g.linescore;
    if (!ls) return 'LIVE';
    return `${ls.isTopInning ? '▲' : '▼'}${ls.currentInning || ''}`;
  }
  if (c === 'F') return 'FINAL';
  return fmtTime(g.gameDate) || 'SCHED';
}

function renderGames(games, stationMap) {
  const list = document.getElementById('glist');
  if (!games.length) {
    list.innerHTML = `<div class="empty"><div class="eico">⚾</div><div class="etitle">No games</div><div class="esub">Check back another day!</div></div>`;
    return;
  }
  const order = {L:0, P:1, F:2};
  const sorted = [...games].sort((a,b) => (order[a.status?.abstractGameCode]??1)-(order[b.status?.abstractGameCode]??1));

  list.innerHTML = sorted.map((g, idx) => {
    const away = g.teams?.away, home = g.teams?.home;
    const sc = statusCls(g), sl = statusLabel(g);
    const ls = g.linescore;
    const isLive = g.status?.abstractGameCode === 'L';
    const isFinal = g.status?.abstractGameCode === 'F';
    const awayName = away?.team?.name || 'Away', homeName = home?.team?.name || 'Home';
    const awaySc = away?.score ?? (isLive||isFinal ? 0 : '');
    const homeSc = home?.score ?? (isLive||isFinal ? 0 : '');
    const awayW = (isFinal||isLive) && (away?.score||0) > (home?.score||0);
    const homeW = (isFinal||isLive) && (home?.score||0) > (away?.score||0);

    let innHTML = '';
    if (isLive && ls) {
      innHTML = `${ls.isTopInning?'▲':'▼'} ${ordinal(ls.currentInning||1)}<br><span style="font-size:.55rem;opacity:.7">${ls.outs??0}out</span>`;
    } else if (isFinal) {
      innHTML = 'F';
    } else {
      innHTML = fmtTime(g.gameDate) || '—';
    }

    // Stations for this game — look up by team name variations
    const awayStn = stationMap[awayName] || stationMap[awayName.split(' ').pop()] || [];
    const homeStn = stationMap[homeName] || stationMap[homeName.split(' ').pop()] || [];
    const allStn = [...awayStn.map(s=>({...s,team:awayName})), ...homeStn.map(s=>({...s,team:homeName}))];

    let drawerContent = '';
    if (allStn.length === 0) {
      drawerContent = `<div class="drw-loading">Loading stations… or tap to open site</div>
        <button class="stn" onclick="openSite('${awayName}','${homeName}')">
          <span class="scall">Open free-sportsradio.com</span>
          <span class="sarr">▶</span>
        </button>`;
    } else {
      let lastTeam = '';
      allStn.forEach(s => {
        if (s.team !== lastTeam) {
          drawerContent += `<div class="drw-team">${s.team}</div>`;
          lastTeam = s.team;
        }
        drawerContent += `<button class="stn" onclick="playStation('${s.slug}','${s.call}','${awayName} @ ${homeName}')">
          <span class="scall">${s.call}</span>
          <span class="sarr">▶</span>
        </button>`;
      });
      drawerContent += `<button class="stn" style="opacity:.5;margin-top:2px" onclick="openSite('${awayName}','${homeName}')">
        <span class="scall">More stations…</span><span class="sarr">▶</span>
      </button>`;
    }

    return `<div class="gc" data-idx="${idx}">
      <div class="gch">
        <span class="badge b${sc[0]}">${sl}</span>
        <span class="gvenue">${g.venue?.name||''}</span>
      </div>
      <div class="gmatch">
        <div class="trow">
          <span class="tabb">${abbr(awayName)}</span>
          <span class="tname">${awayName}</span>
          <span class="tscore${awayW?' win':''}">${awaySc}</span>
          <span style="min-width:38px"></span>
        </div>
        <div class="trow">
          <span class="tabb">${abbr(homeName)}</span>
          <span class="tname">${homeName}</span>
          <span class="tscore${homeW?' win':''}">${homeSc}</span>
          <div class="inn${isFinal?' fin':''}" style="min-width:38px;text-align:right">${innHTML}</div>
        </div>
      </div>
      <div class="lrow">
        <button class="lbtn">${listenHTML()}</button>
      </div>
      <div class="drw">${drawerContent}</div>
    </div>`;
  }).join('');

  document.querySelectorAll('.gc').forEach(card => {
    card.querySelector('.lbtn')?.addEventListener('click', () => toggleCard(card));
  });
  setFocus(Math.min(S.focusIdx, sorted.length - 1));
}

function listenHTML() {
  return `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="1"/><path d="M19 12a7 7 0 1 1-14 0 7 7 0 0 1 14 0"/><path d="M12 5v1M12 18v1M5 12H4M20 12h-1"/></svg> 📻 Listen`;
}

// ── Card toggle ──
function toggleCard(card) {
  const drw = card.querySelector('.drw'), btn = card.querySelector('.lbtn');
  const wasOpen = drw.classList.contains('open');
  document.querySelectorAll('.drw.open').forEach(d => d.classList.remove('open'));
  document.querySelectorAll('.lbtn.active').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.gc.open').forEach(c => c.classList.remove('open'));
  if (!wasOpen) {
    drw.classList.add('open');
    btn.classList.add('active');
    card.classList.add('open');
    btn.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg> Hide`;
  } else {
    btn.innerHTML = listenHTML();
  }
}

// ── In-app audio player ──
function playStation(slug, callSign, gameLabel) {
  const url = `https://www.free-sportsradio.com/listen/${slug}`;
  document.getElementById('playerStn').textContent = callSign;
  document.getElementById('playerGame').textContent = gameLabel;
  document.getElementById('playerFrame').src = url;
  document.getElementById('playerDot').classList.add('playing');
  document.getElementById('playerOverlay').classList.add('visible');
  // Shrink footer to make room
  document.getElementById('ftxt').textContent = '▶ ' + callSign;
  S.currentStn = slug;
  // Highlight active station button
  document.querySelectorAll('.stn').forEach(b => b.classList.remove('playing'));
  document.querySelectorAll('.stn').forEach(b => {
    if (b.getAttribute('onclick')?.includes(slug)) b.classList.add('playing');
  });
}

function openSite(away, home) {
  window.open('https://www.free-sportsradio.com/scores/mlb', '_blank');
}

document.getElementById('playerClose').addEventListener('click', () => {
  document.getElementById('playerOverlay').classList.remove('visible');
  document.getElementById('playerFrame').src = '';
  document.getElementById('playerDot').classList.remove('playing');
  document.getElementById('ftxt').textContent = 'free-sportsradio.com';
  S.currentStn = null;
  document.querySelectorAll('.stn.playing').forEach(b => b.classList.remove('playing'));
});

// ── Focus / scroll wheel ──
function getCards() { return Array.from(document.querySelectorAll('.gc')); }
function setFocus(idx) {
  const cards = getCards();
  if (!cards.length) return;
  idx = Math.max(0, Math.min(idx, cards.length - 1));
  S.focusIdx = idx;
  cards.forEach((c, i) => c.classList.toggle('focused', i === idx));
  cards[idx].scrollIntoView({block:'nearest', behavior:'auto'});
}
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp' || e.key === 'AudioVolumeUp') { setFocus(S.focusIdx-1); e.preventDefault(); }
  else if (e.key === 'ArrowDown' || e.key === 'AudioVolumeDown') { setFocus(S.focusIdx+1); e.preventDefault(); }
  else if (e.key === 'Enter' || e.key === ' ') { const c = getCards(); if (c[S.focusIdx]) toggleCard(c[S.focusIdx]); e.preventDefault(); }
});

// ── Load ──
async function load() {
  document.getElementById('refreshBtn').style.opacity = '0.4';
  document.getElementById('sdate').textContent = fmtDate(S.offset);
  document.getElementById('glist').innerHTML = '<div class="skel skelc"></div><div class="skel skelc"></div><div class="skel skelc"></div>';

  try {
    // Fetch games + stations in parallel
    const [games, stationMap] = await Promise.all([
      fetchGames(S.offset),
      fetchStations()
    ]);
    renderGames(games, stationMap);
    const live = games.filter(g => g.status?.abstractGameCode === 'L').length;
    document.getElementById('sgames').textContent =
      `${games.length} game${games.length!==1?'s':''}${live>0?` · ${live} LIVE`:''}`;
  } catch(err) {
    document.getElementById('glist').innerHTML = `
      <div class="empty">
        <div class="eico">📡</div>
        <div class="etitle">Could not load</div>
        <div class="esub">${err.message || 'Check Wi-Fi'}</div>
        <button class="rbtn" onclick="load()">Retry</button>
      </div>`;
  }
  document.getElementById('refreshBtn').style.opacity = '1';
  // Only auto-refresh on today tab
  if (S.offset === 0) resetCountdown();
}

function resetCountdown() {
  clearInterval(S.timer);
  S.countdown = 30;
  S.timer = setInterval(() => {
    S.countdown--;
    document.getElementById('cb').style.width = (S.countdown / 30 * 100) + '%';
    document.getElementById('rst').textContent = S.countdown + 's';
    if (S.countdown <= 0) { clearInterval(S.timer); load(); }
  }, 1000);
}

// ── Tabs ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    S.offset = parseInt(tab.dataset.offset);
    S.focusIdx = 0;
    clearInterval(S.timer);
    if (S.offset !== 0) {
      document.getElementById('cb').style.width = '100%';
      document.getElementById('rst').textContent = '–';
    }
    load();
  });
});

// ── Theme toggle ──
document.getElementById('themeBtn').addEventListener('click', () => {
  S.theme = S.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', S.theme);
  document.getElementById('themeBtn').innerHTML = S.theme === 'dark'
    ? '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
    : '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
});

document.getElementById('refreshBtn').addEventListener('click', load);

// Boot
load();
</script>
</body>
</html>
