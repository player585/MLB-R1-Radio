<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB R1 Radio - QR Code</title>
<style>
  body { background:#ff4e00; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:-apple-system,sans-serif; }
  h1 { color:#fff; font-size:28px; margin-bottom:20px; }
  #qrcode { background:#fff; padding:20px; border-radius:12px; }
  p { color:#fff; margin-top:16px; font-size:14px; }
</style>
</head>
<body>
<h1>⚾ MLB R1 Radio</h1>
<div id="qrcode"></div>
<p>player585.github.io/MLB-R1-Radio/</p>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  new QRCode(document.getElementById("qrcode"), {
    text: "https://player585.github.io/MLB-R1-Radio/",
    width: 256, height: 256,
    colorDark: "#000000", colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.H
  });
</script>
</body>
</html>
