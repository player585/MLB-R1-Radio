<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=240, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MLB R1 Radio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ─── DESIGN TOKENS ─── */
:root, [data-theme="dark"] {
  --color-bg:              #0d0f0e;
  --color-surface:         #131615;
  --color-surface-2:       #191c1a;
  --color-surface-offset:  #1f2320;
  --color-surface-dynamic: #252928;
  --color-divider:         #2a2e2c;
  --color-border:          #333836;
  --color-text:            #e8ebe9;
  --color-text-muted:      #7a8078;
  --color-text-faint:      #4a4f4d;
  --color-text-inverse:    #0d0f0e;
  --color-primary:         #c8102e;
  --color-primary-hover:   #a50d26;
  --color-win:             #22c55e;
  --color-loss:            #ef4444;
  --color-live:            #f59e0b;
  --color-final:           #7a8078;
  --color-sched:           #5591c7;
  --color-radio:           #3b82f6;
  --radius-sm: 0.25rem;
  --radius-md: 0.375rem;
  --radius-lg: 0.5rem;
  --radius-xl: 0.75rem;
  --radius-full: 9999px;
  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
  --space-4: 1rem;    --space-5: 1.25rem; --space-6: 1.5rem;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  --text-xs: 0.5625rem;
  --text-sm: 0.625rem;
  --text-base: 0.6875rem;
  --text-md: 0.8125rem;
  --text-lg: 0.9375rem;
  --text-xl: 1.0625rem;
  --transition: 160ms cubic-bezier(0.16, 1, 0.3, 1);
}
[data-theme="light"] {
  --color-bg:              #f4f5f4;
  --color-surface:         #ffffff;
  --color-surface-2:       #f9faf9;
  --color-surface-offset:  #eef0ee;
  --color-surface-dynamic: #e5e8e5;
  --color-divider:         #dce0dc;
  --color-border:          #d0d4d0;
  --color-text:            #111412;
  --color-text-muted:      #5a625a;
  --color-text-faint:      #9aa09a;
  --color-text-inverse:    #f4f5f4;
}

/* ─── BASE ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: none; text-size-adjust: none; -webkit-font-smoothing: antialiased; height: 100%; }
body {
  font-family: var(--font-body);
  font-size: var(--text-base);
  color: var(--color-text);
  background: var(--color-bg);
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  max-width: 240px;
  margin: 0 auto;
}
button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
a, button { transition: color var(--transition), background var(--transition), opacity var(--transition); }
a { text-decoration: none; color: inherit; }

/* ─── HEADER ─── */
.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-2) var(--space-3);
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-divider);
  flex-shrink: 0;
  gap: var(--space-2);
}
.header-logo { display: flex; align-items: center; gap: var(--space-2); }
.header-title { font-size: var(--text-sm); font-weight: 700; letter-spacing: -0.01em; line-height: 1; }
.header-title span { color: var(--color-primary); }
.header-controls { display: flex; align-items: center; gap: var(--space-2); }
.live-dot {
  width: 7px; height: 7px;
  border-radius: var(--radius-full);
  background: var(--color-radio);
  animation: pulse 1.8s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.5; transform: scale(0.75); }
}
.btn-icon {
  min-width: 32px; min-height: 32px;
  width: 32px; height: 32px;
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  color: var(--color-text-muted);
  background: var(--color-surface-offset);
}
.btn-icon:active { background: var(--color-surface-dynamic); color: var(--color-text); }

/* ─── STATUS BAR ─── */
.status-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-1) var(--space-3);
  background: color-mix(in oklch, var(--color-primary) 8%, var(--color-surface));
  border-bottom: 1px solid var(--color-divider);
  flex-shrink: 0;
}
.status-text  { font-size: var(--text-xs); color: var(--color-text-muted); font-family: var(--font-mono); }
.status-date  { font-size: var(--text-xs); font-weight: 600; color: var(--color-text); font-family: var(--font-mono); }
.version-watermark { font-size: 0.4375rem; font-family: var(--font-mono); color: var(--color-text-faint); opacity: 0.45; line-height: 1; }

/* ─── MAIN SCROLL AREA ─── */
.main-scroll {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: var(--color-border) transparent;
}
.main-scroll::-webkit-scrollbar { width: 3px; }
.main-scroll::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: var(--radius-full); }

/* ─── GAME CARDS ─── */
.games-list { padding: var(--space-2); display: flex; flex-direction: column; gap: var(--space-2); }
.game-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: box-shadow var(--transition), transform var(--transition);
}
.game-card:active { transform: scale(0.985); }
.game-card.focused { border-color: var(--color-radio); box-shadow: 0 0 0 1.5px var(--color-radio); }
.game-card.open { border-color: var(--color-primary); box-shadow: 0 0 0 1px var(--color-primary); }

.game-card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-2) var(--space-3);
  border-bottom: 1px solid var(--color-divider);
  background: var(--color-surface-2);
}
.game-status-badge {
  font-size: 0.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;
  padding: 1px 4px; border-radius: var(--radius-full); font-family: var(--font-mono);
}
.badge-live  { background: color-mix(in oklch, var(--color-live)  18%, transparent); color: var(--color-live); }
.badge-final { background: color-mix(in oklch, var(--color-final) 18%, transparent); color: var(--color-final); }
.badge-sched { background: color-mix(in oklch, var(--color-sched) 18%, transparent); color: var(--color-sched); }
.game-venue { font-size: 0.5rem; color: var(--color-text-faint); font-family: var(--font-mono); }

.game-matchup { padding: var(--space-2) var(--space-3); display: flex; flex-direction: column; gap: var(--space-1); }
.team-row { display: flex; align-items: center; gap: var(--space-2); }
.team-abbr { font-family: var(--font-mono); font-weight: 700; font-size: var(--text-sm); width: 28px; flex-shrink: 0; letter-spacing: 0.02em; }
.team-name-full { font-size: var(--text-xs); color: var(--color-text-muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ─── LISTEN NOW BUTTON ─── */
.listen-btn-row { padding: var(--space-2) var(--space-3); }
.listen-btn {
  display: flex; align-items: center; justify-content: center; gap: var(--space-1);
  width: 100%; padding: var(--space-2) 0;
  background: color-mix(in oklch, var(--color-radio) 15%, var(--color-surface-offset));
  border: 1px solid color-mix(in oklch, var(--color-radio) 40%, var(--color-border));
  color: var(--color-radio);
  border-radius: var(--radius-md);
  font-family: var(--font-mono); font-size: var(--text-sm); font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.04em;
  cursor: pointer;
}
.listen-btn:active { background: color-mix(in oklch, var(--color-radio) 25%, var(--color-surface-offset)); }
.listen-btn.active {
  background: color-mix(in oklch, var(--color-primary) 15%, var(--color-surface-offset));
  border-color: color-mix(in oklch, var(--color-primary) 40%, var(--color-border));
  color: var(--color-primary);
}

/* ─── STATIONS DRAWER ─── */
.stations-drawer {
  display: none;
  border-top: 1px solid var(--color-divider);
  background: var(--color-surface-2);
  padding: var(--space-1) var(--space-2) var(--space-2);
}
.stations-drawer.open { display: block; }
.station-team-label {
  font-family: var(--font-mono); font-size: 0.5rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--color-primary);
  padding: var(--space-1) var(--space-1) 2px;
  border-bottom: 1px solid var(--color-divider);
  margin-bottom: 2px;
}
.station-link {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-1) var(--space-1);
  border-radius: var(--radius-md);
  margin-bottom: 1px;
  cursor: pointer;
  transition: background var(--transition);
}
.station-link:active, .station-link:hover { background: var(--color-surface-dynamic); }
.station-call { font-family: var(--font-mono); font-size: var(--text-sm); font-weight: 600; color: var(--color-text); }
.station-state { font-family: var(--font-mono); font-size: 0.5rem; color: var(--color-text-faint); }
.station-arrow { font-size: var(--text-xs); color: var(--color-radio); margin-left: var(--space-1); flex-shrink: 0; }

/* ─── SKELETON ─── */
@keyframes shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position:  200% 0; }
}
.skeleton {
  background: linear-gradient(90deg, var(--color-surface-offset) 25%, var(--color-surface-dynamic) 50%, var(--color-surface-offset) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s ease-in-out infinite;
  border-radius: var(--radius-lg);
}
.skel-card { height: 80px; margin-bottom: var(--space-2); }

/* ─── EMPTY / ERROR ─── */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  text-align: center; padding: var(--space-6) var(--space-4);
  color: var(--color-text-muted); gap: var(--space-2);
}
.empty-icon  { font-size: 2rem; opacity: 0.4; }
.empty-title { font-weight: 600; font-size: var(--text-md); color: var(--color-text); }
.empty-sub   { font-size: var(--text-sm); color: var(--color-text-muted); }
.retry-btn {
  margin-top: var(--space-2); padding: var(--space-1) var(--space-3);
  background: var(--color-surface-offset); border-radius: var(--radius-md);
  font-size: var(--text-xs); font-weight: 600; min-height: 28px;
}
.retry-btn:active { background: var(--color-surface-dynamic); }

/* ─── FOOTER ─── */
.app-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-1) var(--space-3);
  background: var(--color-surface); border-top: 1px solid var(--color-divider);
  flex-shrink: 0;
}
.footer-text { font-size: var(--text-xs); color: var(--color-text-faint); font-family: var(--font-mono); }
.countdown-bar-wrap { flex: 1; margin: 0 var(--space-2); height: 3px; background: var(--color-surface-offset); border-radius: var(--radius-full); overflow: hidden; }
.countdown-bar { height: 100%; background: var(--color-primary); border-radius: var(--radius-full); transition: width 1s linear; }
.refresh-status { font-size: var(--text-xs); font-family: var(--font-mono); color: var(--color-text-faint); min-width: 28px; text-align: right; }

:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 2px; border-radius: var(--radius-sm); }
@media (prefers-reduced-motion: reduce) {
  .live-dot { animation: none; }
  .skeleton { animation: none; }
  .countdown-bar { transition: none; }
}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-logo">
    <svg aria-label="MLB R1 Radio" width="18" height="18" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="13" cy="13" r="12" stroke="#c8102e" stroke-width="1.5" fill="none" stroke-dasharray="4 2"/>
      <path d="M7 9.5 C9 8 11 8.5 13 10.5 C15 12.5 17 13 19 11.5" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <path d="M7 16.5 C9 15 11 15.5 13 17.5 C15 19.5 17 20 19 18.5" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <circle cx="13" cy="13" r="2.5" fill="#c8102e"/>
    </svg>
    <div class="header-title"><span>MLB</span> R1 Radio</div>
  </div>
  <div class="header-controls">
    <div class="live-dot" id="liveDot"></div>
    <button class="btn-icon" id="themeBtn" aria-label="Toggle theme">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <button class="btn-icon" id="refreshBtn" aria-label="Refresh">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.31-3.79"/></svg>
    </button>
  </div>
</header>

<div class="status-bar">
  <span style="display:flex;flex-direction:column;align-items:flex-start">
    <span class="version-watermark">v1.0.0</span>
    <span class="status-date" id="statusDate">Loading…</span>
  </span>
  <span class="status-text" id="statusGames">—</span>
</div>

<main class="main-scroll" id="mainScroll">
  <div class="games-list" id="gamesList">
    <div class="skeleton skel-card"></div>
    <div class="skeleton skel-card"></div>
    <div class="skeleton skel-card"></div>
    <div class="skeleton skel-card"></div>
  </div>
</main>

<footer class="app-footer">
  <span class="footer-text">free-sportsradio.com</span>
  <div class="countdown-bar-wrap"><div class="countdown-bar" id="countdownBar" style="width:100%"></div></div>
  <span class="refresh-status" id="refreshStatus">–</span>
</footer>

<script>
const REFRESH_INTERVAL = 180;

const ABBR = {
  'Athletics':'ATH','Oakland Athletics':'ATH',
  'Baltimore Orioles':'BAL','Boston Red Sox':'BOS',
  'Chicago White Sox':'CWS','Cleveland Guardians':'CLE',
  'Detroit Tigers':'DET','Houston Astros':'HOU',
  'Kansas City Royals':'KCR','Los Angeles Angels':'LAA',
  'Minnesota Twins':'MIN','New York Yankees':'NYY',
  'Seattle Mariners':'SEA','Tampa Bay Rays':'TBR',
  'Texas Rangers':'TEX','Toronto Blue Jays':'TOR',
  'Arizona Diamondbacks':'ARI','Atlanta Braves':'ATL',
  'Chicago Cubs':'CHC','Cincinnati Reds':'CIN',
  'Colorado Rockies':'COL','Los Angeles Dodgers':'LAD',
  'Miami Marlins':'MIA','Milwaukee Brewers':'MIL',
  'New York Mets':'NYM','Philadelphia Phillies':'PHI',
  'Pittsburgh Pirates':'PIT','San Diego Padres':'SDP',
  'San Francisco Giants':'SFG','St. Louis Cardinals':'STL',
  'Washington Nationals':'WSN'
};
function abbr(name) { return ABBR[name] || (name||'').substring(0,3).toUpperCase(); }

let state = {
  games: [],
  focusIndex: 0,
  theme: 'dark',
  countdown: REFRESH_INTERVAL,
  countdownTimer: null
};

// R1 scroll wheel hardware integration
window.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowUp' || e.key === 'AudioVolumeUp') {
    setFocus(state.focusIndex - 1); e.preventDefault();
  } else if (e.key === 'ArrowDown' || e.key === 'AudioVolumeDown') {
    setFocus(state.focusIndex + 1); e.preventDefault();
  } else if (e.key === 'Enter' || e.key === ' ') {
    const cards = getCards();
    if (cards[state.focusIndex]) toggleCard(cards[state.focusIndex]);
    e.preventDefault();
  }
});

function getCards() { return Array.from(document.querySelectorAll('.game-card')); }

function setFocus(idx) {
  const cards = getCards();
  if (!cards.length) return;
  idx = Math.max(0, Math.min(idx, cards.length - 1));
  state.focusIndex = idx;
  cards.forEach((c, i) => c.classList.toggle('focused', i === idx));
  cards[idx].scrollIntoView({ block: 'nearest', behavior: 'auto' });
}

function toggleCard(card) {
  const drawer = card.querySelector('.stations-drawer');
  const btn    = card.querySelector('.listen-btn');
  const isOpen = drawer.classList.contains('open');
  document.querySelectorAll('.stations-drawer.open').forEach(d => d.classList.remove('open'));
  document.querySelectorAll('.listen-btn.active').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.game-card.open').forEach(c => c.classList.remove('open'));
  if (!isOpen) {
    drawer.classList.add('open');
    btn.classList.add('active');
    card.classList.add('open');
    btn.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg> Hide Stations`;
  } else {
    btn.innerHTML = listenBtnHTML();
  }
}

function listenBtnHTML() {
  return `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="1"/><path d="M19 12a7 7 0 1 1-14 0 7 7 0 0 1 14 0"/><path d="M12 5v1M12 18v1M5 12H4M20 12h-1"/></svg> 📻 Listen Now`;
}

async function loadGames() {
  document.getElementById('refreshBtn').style.opacity = '0.4';
  const d = new Date();
  document.getElementById('statusDate').textContent =
    d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });

  try {
    const targetUrl = 'https://www.free-sportsradio.com/scores/mlb';
    const proxyUrl  = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
    const res  = await fetch(proxyUrl);
    const data = await res.json();
    const parser = new DOMParser();
    const doc = parser.parseFromString(data.contents, 'text/html');
    const rawText = doc.body ? (doc.body.innerText || doc.body.textContent || '') : '';
    const lines = rawText.split('\n').map(l => l.trim()).filter(l => l);

    const games = [];
    let i = 0;
    while (i < lines.length) {
      if (lines[i] !== 'Listen Now') { i++; continue; }
      let awayTeam = '', homeTeam = '', gameStatus = '';
      for (let j = i - 1; j >= Math.max(0, i - 25); j--) {
        const l = lines[j];
        if (!gameStatus && l.match(/^(Final|Top\s+\d+|Bot(?:tom)?\s+\d+|Mid(?:dle)?\s+\d+|End\s+\d+|Pre-Game|Warmup|Delayed|Postponed)/i)) gameStatus = l;
        if (l.match(/^[A-Z][a-zA-Z\-]+(?:\s[A-Z][a-zA-Z]+)?$/) && !l.match(/\d/) && l.length < 22 &&
            !['Final','Top','Bottom','Middle','End','Pre','Warmup','Delayed','Postponed','Game','Listen','Now','Scores','Radio','Broadcast','TV'].includes(l)) {
          if (!homeTeam) homeTeam = l;
          else if (!awayTeam) awayTeam = l;
        }
        if (awayTeam && homeTeam) break;
      }
      const stationData = {};
      let currentTeam = null;
      let j = i + 1;
      while (j < lines.length && j < i + 50) {
        const l = lines[j];
        if (l === 'Listen Now') break;
        if (l.match(/^(Scores|Schedule|Standings|Teams|MLB\s)/i)) break;
        if (l.match(/^[A-Z][a-zA-Z\-]+(?:\s[A-Z][a-zA-Z]+)?$/) && !l.match(/\d/) && l.length < 22) {
          currentTeam = l;
          if (!stationData[currentTeam]) stationData[currentTeam] = [];
        } else if (currentTeam && l.match(/^[A-Z0-9]{2,6}\s+[\d.]+\s*(AM|FM)/i)) {
          const nextLine = lines[j + 1] || '';
          let state_ = '';
          if (nextLine.match(/^[A-Z][a-zA-Z\s]+$/) && nextLine.length < 20 && !nextLine.match(/\d/)) {
            state_ = nextLine; j++;
          }
          stationData[currentTeam].push({ call: l, state: state_ });
        }
        j++;
      }
      games.push({ awayTeam: awayTeam || 'Away', homeTeam: homeTeam || 'Home', gameStatus, stationData });
      i = j;
    }

    renderGames(games);
    const live = games.filter(g => g.gameStatus.match(/Top|Bot|Mid|End/i)).length;
    document.getElementById('statusGames').textContent = `${games.length} game${games.length !== 1 ? 's' : ''}${live > 0 ? ` · ${live} LIVE` : ''}`;
  } catch (err) {
    document.getElementById('gamesList').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📡</div>
        <div class="empty-title">Could not load</div>
        <div class="empty-sub">${err.message || 'Check Wi-Fi connection'}</div>
        <button class="retry-btn" onclick="loadGames()">Retry</button>
      </div>`;
  }
  document.getElementById('refreshBtn').style.opacity = '1';
  resetCountdown();
}

function statusCls(gs) {
  if (!gs) return 'sched';
  if (gs.match(/Final|Postponed|Delayed/i)) return 'final';
  if (gs.match(/Top|Bot|Mid|End/i)) return 'live';
  return 'sched';
}

function renderGames(games) {
  const list = document.getElementById('gamesList');
  if (!games.length) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚾</div>
        <div class="empty-title">No games today</div>
        <div class="empty-sub">No broadcasts found. Check back on a game day!</div>
      </div>`;
    return;
  }
  list.innerHTML = games.map((game, idx) => {
    const sc = statusCls(game.gameStatus);
    const sl = game.gameStatus || (sc === 'sched' ? 'SCHED' : sc.toUpperCase());
    let stationsHTML = '';
    const teamKeys = Object.keys(game.stationData);
    if (teamKeys.length > 0) {
      teamKeys.forEach(team => {
        const stations = game.stationData[team];
        if (!stations || !stations.length) return;
        stationsHTML += `<div class="station-team-label">${team}</div>`;
        stations.forEach(s => {
          const slug = s.call.replace(/\s+/g, '-').replace(/[^a-zA-Z0-9\-]/g, '').toLowerCase();
          const url = `https://www.free-sportsradio.com/listen/${slug}`;
          stationsHTML += `
            <a href="${url}" target="_blank" class="station-link">
              <span class="station-call">${s.call}</span>
              <span style="display:flex;align-items:center;gap:2px">
                <span class="station-state">${s.state}</span>
                <span class="station-arrow">▶</span>
              </span>
            </a>`;
        });
      });
    } else {
      stationsHTML = `<a href="https://www.free-sportsradio.com/scores/mlb" target="_blank" class="station-link">
        <span class="station-call">Open Broadcast Page</span>
        <span class="station-arrow">▶</span>
      </a>`;
    }
    return `
      <div class="game-card" data-idx="${idx}">
        <div class="game-card-header">
          <span class="game-status-badge badge-${sc}">${sl}</span>
          <span class="game-venue">free-sportsradio.com</span>
        </div>
        <div class="game-matchup">
          <div class="team-row">
            <span class="team-abbr">${abbr(game.awayTeam)}</span>
            <span class="team-name-full">${game.awayTeam}</span>
          </div>
          <div class="team-row">
            <span class="team-abbr">${abbr(game.homeTeam)}</span>
            <span class="team-name-full">${game.homeTeam}</span>
          </div>
        </div>
        <div class="listen-btn-row">
          <button class="listen-btn">${listenBtnHTML()}</button>
        </div>
        <div class="stations-drawer">${stationsHTML}</div>
      </div>`;
  }).join('');

  document.querySelectorAll('.game-card').forEach(card => {
    card.querySelector('.listen-btn')?.addEventListener('click', () => toggleCard(card));
  });
  setFocus(Math.min(state.focusIndex, games.length - 1));
}

function resetCountdown() {
  state.countdown = REFRESH_INTERVAL;
  clearInterval(state.countdownTimer);
  state.countdownTimer = setInterval(() => {
    state.countdown--;
    document.getElementById('countdownBar').style.width = (state.countdown / REFRESH_INTERVAL * 100) + '%';
    document.getElementById('refreshStatus').textContent = state.countdown > 60
      ? Math.ceil(state.countdown / 60) + 'm' : state.countdown + 's';
    if (state.countdown <= 0) { clearInterval(state.countdownTimer); loadGames(); }
  }, 1000);
}

document.getElementById('refreshBtn').addEventListener('click', loadGames);

document.getElementById('themeBtn').addEventListener('click', () => {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', state.theme);
  document.getElementById('themeBtn').innerHTML = state.theme === 'dark'
    ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
    : '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
});

loadGames();
</script>
</body>
</html>
